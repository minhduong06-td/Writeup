<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Writeups</title>
  <meta name="description" content="Writeups by difficulty level">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="pixel-grid-bg"></div>

  <button class="theme-toggle" id="theme-toggle" title="Toggle dark / light mode">🌙</button>

  <main class="shell">

    <div id="home-view">
      <header class="hero">
        <div class="hero-title-wrap">
          <div class="pixel-icon">📁</div>
          <h1 class="pixel-title">WRITEUP<br><span class="green">FORENSICS</span></h1>
        </div>

        <div class="level-switch">
          <button class="category-btn training-btn" data-category="training">
            <span class="btn-icon">🗂️</span>
            <span class="btn-label">TRAINING</span>
            <span class="btn-sub" id="training-count">[ — FILES ]</span>
          </button>
          <button class="category-btn ctf-btn" data-category="ctf-competitions">
            <span class="btn-icon">🏆</span>
            <span class="btn-label">CONTESTS</span>
            <span class="btn-sub" id="ctf-count">[ — FILES ]</span>
          </button>
          <button class="category-btn task-btn" data-category="task">
            <span class="btn-icon">🔍</span>
            <span class="btn-label">TASK</span>
            <span class="btn-sub" id="task-count">[ — FILES ]</span>
          </button>
        </div>

        <div class="search-box-wrap">
          <div class="search-label">🔍 SEARCH BY NAME</div>
          <div class="search-row">
            <input type="text" id="search-input" class="search-input" placeholder="🔍" autocomplete="off" spellcheck="false">
            <button id="search-btn" class="search-btn">GO</button>
          </div>
          <div id="search-results" class="search-results hidden"></div>
        </div>
      </header>
    </div>

    <section id="training-view" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div class="breadcrumb" id="training-breadcrumb">
            <span class="bc-root" id="back-home-bc-tr">[ ROOT ]</span>
            <span class="bc-sep">▶</span>
            <span class="bc-current">TRAINING</span>
          </div>
          <button id="back-home-from-training" class="ghost-btn">⬅ HOME</button>
        </div>
        <div class="level-switch training-level-switch">
          <button class="level-btn easy-btn" data-level="easy">
            <span class="btn-icon">🗂️</span>
            <span class="btn-label">EASY</span>
            <span class="btn-sub" id="easy-count">[ — FILES ]</span>
          </button>
          <button class="level-btn veryeasy-btn" data-level="very-easy">
            <span class="btn-icon">📂</span>
            <span class="btn-label">VERY EASY</span>
            <span class="btn-sub" id="veryeasy-count">[ — FILES ]</span>
          </button>
          <button class="level-btn medium-btn" data-level="medium">
            <span class="btn-icon">📂</span>
            <span class="btn-label">MEDIUM</span>
            <span class="btn-sub" id="medium-count">[ — FILES ]</span>
          </button>
        </div>
      </div>
    </section>

    <section id="ctf-view" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div class="breadcrumb" id="ctf-breadcrumb">
            <span class="bc-root" id="back-home-bc-ctf">[ ROOT ]</span>
            <span class="bc-sep">▶</span>
            <span class="bc-current">CTF-COMPETITIONS</span>
          </div>
          <button id="back-home-from-ctf" class="ghost-btn">⬅ HOME</button>
        </div>
        <div class="level-switch ctf-level-switch">
          <button class="level-btn texsaw2026-btn" data-level="texsaw-2026">
            <span class="btn-icon">🏆</span>
            <span class="btn-label">TEXSAW 2026</span>
            <span class="btn-sub" id="texsaw2026-count">[ — FILES ]</span>
          </button>
          <button class="level-btn dawgctf2026-btn" data-level="dawgctf-2026">
            <span class="btn-icon">🐾</span>
            <span class="btn-label">DAWGCTF 2026</span>
            <span class="btn-sub" id="dawgctf2026-count">[ — FILES ]</span>
          </button>
          <button class="level-btn umassctf2026-btn" data-level="umassctf-2026">
            <span class="btn-icon">🎓</span>
            <span class="btn-label">UMASSCTF 2026</span>
            <span class="btn-sub" id="umassctf2026-count">[ — FILES ]</span>
          </button>
          <button class="level-btn cit2026-btn" data-level="cit-2026">
            <span class="btn-icon">💻</span>
            <span class="btn-label">CIT 2026</span>
            <span class="btn-sub" id="cit2026-count">[ — FILES ]</span>
          </button>
          <button class="level-btn bluehensctf2026-btn" data-level="bluehensctf-2026">
            <span class="btn-icon">🐔</span>
            <span class="btn-label">BLUEHENSCTF 2026</span>
            <span class="btn-sub" id="bluehensctf2026-count">[ — FILES ]</span>
          </button>
        </div>
      </div>
    </section>

    <section id="task-view" class="hidden">
      <div class="panel">
        <div class="panel-head">
          <div class="breadcrumb" id="task-breadcrumb">
            <span class="bc-root" id="back-home-bc-task">[ ROOT ]</span>
            <span class="bc-sep">▶</span>
            <span class="bc-current">TASK</span>
          </div>
          <button id="back-home-from-task" class="ghost-btn">⬅ HOME</button>
        </div>
        <div class="level-switch task-level-switch">
          <button class="level-btn persistence-ubuntu-btn" data-level="persistence-ubuntu">
            <span class="btn-icon">🐧</span>
            <span class="btn-label">PERSISTENCE UBUNTU</span>
            <span class="btn-sub" id="persistence-ubuntu-count">[ — FILES ]</span>
          </button>
        </div>
      </div>
    </section>

    <section id="list-view" class="hidden">
      <div class="sidebar-wrapper">
        <div class="panel sidebar-panel" id="sidebar-panel">
          <div class="panel-head">
            <div class="breadcrumb" id="list-breadcrumb"></div>
            <div class="panel-head-actions">
              <button id="sidebar-toggle" class="ghost-btn sidebar-toggle-btn" title="Toggle sidebar">◀ HIDE</button>
              <button id="back-home" class="ghost-btn">⬅ BACK</button>
            </div>
          </div>
          <div id="sidebar-content" class="sidebar-content">
            <div id="list-title" class="list-title-bar"></div>
            <div id="post-grid" class="post-grid"></div>
          </div>
        </div>
        <button id="sidebar-reopen" class="sidebar-reopen-btn hidden" title="Open sidebar">▶</button>
      </div>
    </section>

    <section id="post-view" class="hidden">
      <div class="panel">
        <div class="panel-head panel-head-post">
          <div class="breadcrumb" id="post-breadcrumb"></div>
          <div class="post-actions">
            <button id="back-list" class="ghost-btn">⬅ LIST</button>
          </div>
        </div>

        <div class="post-search-wrap">
          <div class="search-row">
            <input type="text" id="post-search-input" class="search-input post-search-input"
              placeholder="🔍" autocomplete="off" spellcheck="false">
            <button id="post-search-btn" class="search-btn">GO</button>
          </div>
          <div id="post-search-results" class="search-results hidden"></div>
        </div>

        <div class="post-header-info">
          <span id="post-level" class="level-badge"></span>
          <h2 id="post-title" class="post-title-display"></h2>
        </div>
        <div class="divider-pixel"></div>
        <article id="markdown" class="markdown-body"></article>

        <div id="post-pagination" class="post-pagination hidden"></div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/powershell.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/php.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
